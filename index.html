<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">שם המועמד — תנועה פוליטית</title>
  <meta name="description" id="metaDescription" content="">
  <meta property="og:image" content="images/og-image.jpg">
  <link rel="icon" href="images/favicon.ico">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Frank+Ruhl+Libre:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <!-- ====== SKIP TO CONTENT (Accessibility) ====== -->
  <a href="#main-content" class="skip-link" id="skipLink">דלג לתוכן</a>

  <!-- ====== HEADER ====== -->
  <header class="site-header" id="siteHeader">
    <div class="header-container">
      <!-- Logo & Candidate Name + CTA -->
      <div class="header-left">
        <a href="#hero" class="header-logo">
          <img src="images/logo.svg" alt="" id="headerLogo" class="logo-img">
        </a>
        <div class="header-identity">
          <span class="candidate-name" data-i18n="header.candidateName"></span>
          <a href="#join" class="btn btn-primary header-cta" data-i18n="header.ctaButton"></a>
        </div>
      </div>

      <!-- Header Actions -->
      <div class="header-actions">
        <!-- Social Icons (header) -->
        <div class="social-icons header-social" id="headerSocial">
          <!-- Populated by JS -->
        </div>

        <!-- Language Toggle -->
        <button class="lang-toggle" id="langToggle" aria-label="Switch Language">
          <span data-i18n="languageToggle"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ====== MAIN CONTENT ====== -->
  <main id="main-content">

    <!-- ── Hero Section ── -->
    <section class="hero" id="hero">
      <div class="hero-grid">
        <!-- Text Side -->
        <div class="hero-text">
          <h1 class="hero-headline anim-fade-up" data-i18n="hero.headline"></h1>
          <p class="hero-subheadline anim-fade-up anim-delay-1" data-i18n="hero.subheadline"></p>
        </div>
        <!-- Image Side -->
        <div class="hero-image-wrapper anim-fade-left">
          <img src="" alt="" id="heroImage" class="hero-img lazyload">
        </div>
      </div>
    </section>

    <!-- ── Join Form (Primary) ── -->
    <section class="section join-section join-primary" id="join">
      <div class="container">
        <div class="form-wrapper anim-fade-up">
          <h2 class="section-title" data-i18n="joinForm.title"></h2>
          <p class="section-subtitle" data-i18n="joinForm.subtitle"></p>
          <form class="lead-form" id="joinFormPrimary" novalidate>
            <div class="form-grid">
              <div class="form-field" data-field="name">
                <input type="text" name="name" required autocomplete="name">
                <label data-i18n="joinForm.fields.name"></label>
                <span class="field-error"></span>
              </div>
              <div class="form-field" data-field="email">
                <input type="email" name="email" required autocomplete="email">
                <label data-i18n="joinForm.fields.email"></label>
                <span class="field-error"></span>
              </div>
              <div class="form-field" data-field="phone">
                <input type="tel" name="phone" required autocomplete="tel">
                <label data-i18n="joinForm.fields.phone"></label>
                <span class="field-error"></span>
              </div>
            </div>
            <div class="form-checkboxes">
              <h4 class="form-checkboxes-title" data-i18n="joinForm.howCanIHelp"></h4>
              <label class="checkbox-label">
                <input type="checkbox" name="hostMeetings">
                <span class="checkbox-custom"></span>
                <span data-i18n="joinForm.checkboxes.hostMeetings"></span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="volunteer">
                <span class="checkbox-custom"></span>
                <span data-i18n="joinForm.checkboxes.volunteer"></span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="joinUpdates">
                <span class="checkbox-custom"></span>
                <span data-i18n="joinForm.checkboxes.joinUpdates"></span>
              </label>
            </div>
            <div class="form-privacy">
              <label class="checkbox-label">
                <input type="checkbox" name="privacy" required>
                <span class="checkbox-custom"></span>
                <span>
                  <span data-i18n="joinForm.privacyText"></span>
                  <a href="#privacy" class="privacy-link" data-i18n="joinForm.privacyLink"></a>
                </span>
              </label>
            </div>
            <button type="submit" class="btn btn-primary btn-submit">
              <span data-i18n="joinForm.submitButton"></span>
              <span class="btn-loader" aria-hidden="true"></span>
            </button>
            <div class="form-message" id="formMessagePrimary" aria-live="polite"></div>
          </form>
        </div>
      </div>
    </section>

  </main>

  <!-- ====== FOOTER ====== -->
  <footer class="site-footer" id="siteFooter">
    <div class="footer-container">
      <div class="footer-social" id="footerSocial">
        <!-- Populated by JS -->
      </div>
      <div class="footer-info">
        <p data-i18n="footer.copyright"></p>
        <p class="footer-credits">
          <span data-i18n="footer.designCredit"></span>
          <span class="footer-separator">|</span>
          <span data-i18n="footer.photoCredit"></span>
        </p>
      </div>
    </div>
  </footer>

  <!-- ====== ACCESSIBILITY WIDGET ====== -->
  <div class="a11y-widget" id="a11yWidget">
    <button class="a11y-toggle" id="a11yToggle" aria-label="Accessibility Options">
      <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
        <path d="M12 2C13.1 2 14 2.9 14 4C14 5.1 13.1 6 12 6C10.9 6 10 5.1 10 4C10 2.9 10.9 2 12 2ZM21 9H15V22H13V16H11V22H9V9H3V7H21V9Z"/>
      </svg>
    </button>
    <div class="a11y-panel" id="a11yPanel" aria-hidden="true">
      <div class="a11y-panel-header">
        <h3 data-i18n="accessibility.title"></h3>
        <button class="a11y-close" id="a11yClose" aria-label="Close">&times;</button>
      </div>
      <div class="a11y-options">
        <button class="a11y-option" data-action="increaseFontSize">
          <span class="a11y-icon">A+</span>
          <span data-i18n="accessibility.options.increaseFontSize"></span>
        </button>
        <button class="a11y-option" data-action="decreaseFontSize">
          <span class="a11y-icon">A-</span>
          <span data-i18n="accessibility.options.decreaseFontSize"></span>
        </button>
        <button class="a11y-option" data-action="increaseLineHeight">
          <span class="a11y-icon">↕</span>
          <span data-i18n="accessibility.options.increaseLineHeight"></span>
        </button>
        <button class="a11y-option" data-action="readableFont">
          <span class="a11y-icon">Aa</span>
          <span data-i18n="accessibility.options.readableFont"></span>
        </button>
        <button class="a11y-option" data-action="highContrast">
          <span class="a11y-icon">◐</span>
          <span data-i18n="accessibility.options.highContrast"></span>
        </button>
        <button class="a11y-option" data-action="grayscale">
          <span class="a11y-icon">◑</span>
          <span data-i18n="accessibility.options.grayscale"></span>
        </button>
        <button class="a11y-option" data-action="highlightLinks">
          <span class="a11y-icon">🔗</span>
          <span data-i18n="accessibility.options.highlightLinks"></span>
        </button>
        <button class="a11y-option" data-action="readingMask">
          <span class="a11y-icon">▬</span>
          <span data-i18n="accessibility.options.readingMask"></span>
        </button>
        <button class="a11y-option" data-action="hideImages">
          <span class="a11y-icon">🖼</span>
          <span data-i18n="accessibility.options.hideImages"></span>
        </button>
        <button class="a11y-option" data-action="pauseAnimations">
          <span class="a11y-icon">⏸</span>
          <span data-i18n="accessibility.options.pauseAnimations"></span>
        </button>
        <button class="a11y-option" data-action="focusOutline">
          <span class="a11y-icon">□</span>
          <span data-i18n="accessibility.options.focusOutline"></span>
        </button>
        <button class="a11y-option a11y-reset" data-action="resetAll">
          <span class="a11y-icon">↺</span>
          <span data-i18n="accessibility.options.resetAll"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- ====== READING MASK (Accessibility) ====== -->
  <div class="reading-mask" id="readingMask" aria-hidden="true">
    <div class="reading-mask-top"></div>
    <div class="reading-mask-bottom"></div>
  </div>

  <!-- ====== SCRIPTS ====== -->
  <script src="config/content.js"></script>
  <script src="config/settings.js"></script>
  <script src="js/app.js"></script>
  <script src="js/accessibility.js"></script>
  <script src="js/form.js"></script>

</body>
</html>
